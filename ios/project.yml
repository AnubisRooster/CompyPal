name: Companion
options:
  bundleIdPrefix: ai.companion
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  GLTFKit2:
    url: https://github.com/warrenm/GLTFKit2
    from: 0.5.15

settings:
  SWIFT_VERSION: "5.9"

targets:
  Companion:
    type: application
    platform: iOS
    sources:
      - path: Companion
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: ai.companion.app
      INFOPLIST_FILE: Companion/Info.plist
      DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
      CODE_SIGN_STYLE: Automatic
      MARKETING_VERSION: "0.1.0"
      CURRENT_PROJECT_VERSION: "${BUILD_NUMBER:-1}"
    info:
      path: Companion/Info.plist
      properties:
        CFBundleName: "Companion"
        CFBundleDisplayName: "AI Companion"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        NSMicrophoneUsageDescription: "Companion needs microphone access for voice chat."
        NSSpeechRecognitionUsageDescription: "Companion uses speech recognition to transcribe your voice."
    dependencies:
      - package: GRDB
      - package: GLTFKit2
    preBuildScripts:
      - name: "Regenerate XcodeGen"
        script: |
          if which xcodegen >/dev/null 2>&1; then
            xcodegen generate
          fi
        basedOnDependencyAnalysis: false

  CompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CompanionTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: ai.companion.tests
      TEST_TARGET_NAME: Companion
      GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Companion
      - package: GLTFKit2
