name: Companion
options:
  bundleIdPrefix: ai.companion
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  SWIFT_VERSION: "5.9"

targets:
  Companion:
    type: application
    platform: iOS
    sources:
      - Companion
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: ai.companion.app
      INFOPLIST_FILE: Companion/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Companion/Companion.entitlements
      properties:
        com.apple.developer.applesignin: ["Default"]
    info:
      path: Companion/Info.plist
      properties:
        CFBundleName: "Companion"
        CFBundleDisplayName: "AI Companion"
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        NSMicrophoneUsageDescription: "The companion needs microphone access for voice chat."
    dependencies: []

  CompanionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CompanionTests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: ai.companion.tests
      TEST_TARGET_NAME: Companion
    dependencies:
      - target: Companion
